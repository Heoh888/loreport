# Distributed mode: separate api, worker, postgres, rabbitmq (for scale / dev).
# Usage: docker compose -f docker-compose.distributed.yml up

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loreport
      POSTGRES_USER: loreport
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loreport}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loreport -d loreport"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  loreport-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      ["/app/backend/.venv/bin/python", "-m", "uvicorn", "loreport_server.api.main:app", "--host", "0.0.0.0", "--port", "3080"]
    ports:
      - "3080:3080"
    volumes:
      - ${REPO_PATH:-..}:/repo:rw
    env_file:
      - path: ../.env
        required: false
    environment:
      REPO_PATH: /repo
      LOREPORT_DIR: loreport
      LOREPORT_MODE: distributed
      DATABASE_URL: postgresql+asyncpg://loreport:${POSTGRES_PASSWORD:-loreport}@postgres/loreport
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-300}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      STATIC_DIR: /app/static
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  loreport-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["/app/backend/.venv/bin/python", "-m", "loreport_server.worker.consumer"]
    volumes:
      - ${REPO_PATH:-..}:/repo:rw
    env_file:
      - path: ../.env
        required: false
    environment:
      REPO_PATH: /repo
      LOREPORT_DIR: loreport
      LOREPORT_MODE: distributed
      DATABASE_URL: postgresql+asyncpg://loreport:${POSTGRES_PASSWORD:-loreport}@postgres/loreport
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data:
